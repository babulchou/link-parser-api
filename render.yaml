services:
  - type: web
    name: link-parser-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: XHS_COOKIES
        sync: false  # 在 Render Dashboard 手动设置（包含敏感 Cookie 信息）
